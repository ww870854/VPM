name: Release VPM

on:
  push:
    branches:
      - main
    paths:
      - version.txt

permissions:
  contents: write

concurrency:
  group: release-vpm-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < version.txt | xargs)"
          if [ -z "$version" ]; then
            echo "version.txt is empty." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify release binary
        run: |
          if [ ! -f release/VPM.exe ]; then
            echo "release/VPM.exe is missing." >&2
            echo "Build locally (build.bat), then commit release/VPM.exe with the version.txt bump." >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: release/VPM.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
